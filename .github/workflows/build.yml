name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: exe 빌드
        run: pyinstaller --onefile --windowed --name ActivityTracker activity_tracker.py

      - name: exe 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ActivityTracker-Windows
          path: dist/ActivityTracker.exe
